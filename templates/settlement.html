
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日結算表</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }
    h2 {
      font-size: 16px;
      margin: 0 0 10px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 12px;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 8px;
      align-items: end;
      margin-bottom: 8px;
    }
    .expense-item {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
    }
    .muted {
      color: #666;
      font-size: 13px;
    }
    .summary div {
      margin-bottom: 8px;
      font-size: 16px;
    }
    .danger {
      color: #c62828;
      font-weight: 700;
    }
    .ok {
      color: #2e7d32;
      font-weight: 700;
    }
    .btn-secondary {
      background: #fff;
      color: #333;
    }
    .btn-primary {
      background: #06c755;
      color: #fff;
      border: none;
      font-weight: 700;
    }
    /* 移除 number input 的上下箭頭 */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    /* 給動態支出金額欄位用 */
    .no-spinner {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .no-spinner::-webkit-outer-spin-button,
    .no-spinner::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>每日結算表</h1>
      <div class="muted">26.327.0版</div>
    </div>

    <div class="card">
      <h2>基本資料</h2>
      <label for="store_display">分店</label>
      <input type="text" id="store_display" readonly required/>
      <input type="hidden" id="store" />
      
      <label for="date">日期</label>
      <input type="date" id="date" required/>

      <label for="operator_name">填表人</label>
      <input type="text" id="operator_name" readonly required />
    </div>

    <div class="card">
      <h2>收入</h2>
      <label for="revenue_a">營業額 A</label>
      <input type="number" id="revenue_a" min="0" inputmode="numeric" required />
    </div>

    <div class="card">
      <h2>支出明細</h2>
      <div id="expense-list"></div>
      <button type="button" class="btn-secondary" onclick="addExpenseRow()">+ 新增一筆支出</button>

      <div class="summary">
        <div>支出合計 B：<strong id="expense_total_b">0</strong></div>
      </div>
    </div>

    <div class="card">
      <h2>現金對帳</h2>
      <label for="actual_cash_d">實際現金 D</label>
      <input type="number" id="actual_cash_d" min="0" inputmode="numeric" required />

      <div class="summary">
        <div>應收現金 C = A - B：<strong id="should_cash_c">0</strong></div>
        <div>溢短收 E = D - C：<strong id="diff_e">0</strong></div>
        <div>狀態：<strong id="status_text" class="ok">正常</strong></div>
      </div>
    </div>

    <div class="card">
      <h2>備註</h2>
      <textarea id="note" placeholder="可填今日特殊情況"></textarea>
      <button type="button" class="btn-primary" id="submit-btn" onclick="submitForm()">送出</button>
    </div>
  </div>

<script>
  const liffId = "{{ liff_id }}";
  const LIFF_URL = `https://liff.line.me/${liffId}`;

  function todayStr() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, "0");
    const dd = String(now.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function num(v) {
    const cleaned = String(v || "").replace(/,/g, "").trim();
    return cleaned === "" ? 0 : Number(cleaned);
  }

  function getQueryParam(name) {
    const url = new URL(window.location.href);
    return url.searchParams.get(name) || "";
  }

  function addExpenseRow(name = "", amount = "") {
    const list = document.getElementById("expense-list");
    const div = document.createElement("div");
    div.className = "expense-item";
    div.innerHTML = `
      <div class="row">
        <div>
          <label>支出項目</label>
          <input type="text" class="expense-name" value="${name}">
        </div>
        <div>
          <label>金額</label>
          <input type="text" class="expense-amount no-spinner" inputmode="numeric" value="${amount}">
        </div>
      </div>
      <button type="button" class="btn-secondary remove-btn">刪除此筆</button>
    `;
    list.appendChild(div);

    div.querySelector(".remove-btn").addEventListener("click", () => {
      div.remove();
      calculate();
    });

    div.querySelector(".expense-name").addEventListener("input", calculate);
    div.querySelector(".expense-amount").addEventListener("input", calculate);
  }

  function collectExpenses() {
    const names = document.querySelectorAll(".expense-name");
    const amounts = document.querySelectorAll(".expense-amount");
    const items = [];

    for (let i = 0; i < names.length; i++) {
      const name = names[i].value.trim();
      const amount = num(amounts[i].value);
      if (!name && amount === 0) continue;
      items.push({ name, amount });
    }
    return items;
  }

  function calculate() {
    const revenueA = num(document.getElementById("revenue_a").value);
    const actualCashD = num(document.getElementById("actual_cash_d").value);
    const expenses = collectExpenses();

    const expenseTotalB = expenses.reduce((sum, item) => sum + num(item.amount), 0);
    const shouldCashC = revenueA - expenseTotalB;
    const diffE = actualCashD - shouldCashC;

    document.getElementById("expense_total_b").innerText = expenseTotalB.toLocaleString();
    document.getElementById("should_cash_c").innerText = shouldCashC.toLocaleString();
    document.getElementById("diff_e").innerText = diffE.toLocaleString();

    const statusEl = document.getElementById("status_text");
    if (Math.abs(diffE) > 100) {
      statusEl.innerText = "異常提醒";
      statusEl.className = "danger";
    } else {
      statusEl.innerText = "正常";
      statusEl.className = "ok";
    }
  }

  async function initLiff() {
  document.getElementById("date").value = todayStr();

  try {
    await liff.init({ liffId });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href });
      return;
    }

    if (!liff.isInClient()) {
      alert("請從 LINE 群組內點擊「結算」開啟表單，不要直接用瀏覽器開啟。");
      window.location.href = LIFF_URL;
      return;
    }

    const profile = await liff.getProfile();
    document.getElementById("operator_name").value = profile.displayName || "";

    const storeFromQuery = getQueryParam("store").trim();

    if (!storeFromQuery || !["后庄店", "霧峰店"].includes(storeFromQuery)) {
      alert("無法判定分店，請回到 LINE 群組重新點擊「結算」。");
      return;
    }

    document.getElementById("store").value = storeFromQuery;
    document.getElementById("store_display").value = storeFromQuery;
  } catch (err) {
    console.error("LIFF 初始化失敗：", err);
    alert("表單初始化失敗，請回到 LINE 群組重新點擊「結算」再開啟。");
  }
}

  async function submitForm() {
    const submitBtn = document.getElementById("submit-btn");

    const store = document.getElementById("store").value;
    const date = document.getElementById("date").value;
    const operatorName = document.getElementById("operator_name").value.trim();
    const revenueA = num(document.getElementById("revenue_a").value);
    const actualCashD = num(document.getElementById("actual_cash_d").value);
    const note = document.getElementById("note").value.trim();
    const expenses = collectExpenses();

    if (!store) {
      alert("無法判定分店，請從正確的 LINE 群組重新開啟表單。");
      return;
    }

    if (!date) {
      alert("請選擇日期");
      return;
    }

    if (!operatorName) {
      alert("無法取得填表人資訊，請從 LINE 群組重新輸入「結算」開啟表單。");
      return;
    }

    if (document.getElementById("revenue_a").value.trim() === "") {
      alert("請輸入營業額 A");
      return;
    }

    if (document.getElementById("actual_cash_d").value.trim() === "") {
      alert("請輸入實際現金 D");
      return;
    }

    if (revenueA < 0) {
      alert("營業額 A 不可小於 0");
      return;
    }

    if (actualCashD < 0) {
      alert("實際現金 D 不可小於 0");
      return;
    }

    let idToken = "";

    try {
      if (typeof liff !== "undefined" && liff.isLoggedIn()) {
        idToken = liff.getIDToken() || "";
      }
    } catch (err) {
      console.warn("取得 ID Token 失敗：", err);
    }

    if (!idToken) {
      alert("請務必從 LINE 群組內開啟表單後再送出。");
      return;
    }

    const payload = {
      store,
      date,
      operator_name: operatorName,
      revenue_a: revenueA,
      actual_cash_d: actualCashD,
      note,
      expenses,
      id_token: idToken
    };

    try {
      submitBtn.disabled = true;
      submitBtn.innerText = "送出中，請稍候...";

      const res = await fetch("/api/settlement/submit", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      let data = {};
      try {
        data = await res.json();
      } catch (err) {
        throw new Error("伺服器回傳格式錯誤");
      }

      if (!res.ok || !data.ok) {
        alert(data.error || "送出失敗，請稍後再試");
        return;
      }

      const r = data.result;
      alert(
        `${r.store}｜${r.date}\n` +
        `營業額(A)：${r.revenue_a}\n` +
        `支出(B)：${r.expense_total_b}\n` +
        `應收現金(C)：${r.should_cash_c}\n` +
        `實際現金(D)：${r.actual_cash_d}\n` +
        `溢短收(E)：${r.diff_e}\n` +
        `狀態：${r.status}\n` +
        `填表人：${r.operator_name}`
      );

      if (liff.isInClient()) {
        liff.closeWindow();
      }

    } catch (err) {
      console.error(err);
      alert("送出失敗，請稍後再試");
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerText = "送出";
    }
  }
    

  document.getElementById("revenue_a").addEventListener("input", calculate);
  document.getElementById("actual_cash_d").addEventListener("input", calculate);

  addExpenseRow();
  initLiff();
  calculate();
</script>
</body>
</html>
